<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<form action="#" method="post">
    <label for="numero1">Ingresa numero 1:</label>
    <input type="number" id="numero1" name="numero1"/>
    <br>
    <label for="numero2">Ingresa numero 2:</label>
    <input type="number" id="numero2" name="numero2"/>
    <br>
    <button type="button" id="btn_suma">+</button>
        <br>
        <p id="resultado"></p>
    <button type="button" id="btn_resta">-</button>
    <br>
    <p id="resultadoresta"></p>
    <button type="button" id="btn_dividir">/</button>
    <br>
    <p id="resultadodividir"></p>
    <button type="button" id="btn_multiplicar">*</button>
    <br>
    <p id="resultadomultiplicar"></p>
</form>
<script src="js/calculadora.js"></script>
</body>
</html>
