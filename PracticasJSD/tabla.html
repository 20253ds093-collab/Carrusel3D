<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Libro de alumnos</title>
    <link href="css/bootstrap.css" rel="stylesheet" />
</head>
<body>
<header>
   <nav class="navbar bg-black">
       <div class="container-fluid">
           <a class="navbar-brand text-light" href="#">Bienvenidos 3D</a>
       </div>
   </nav>
</header>
<hr>
<main>

    <div class="container">
        <div class="row">
<div class="col">
    <table class="table table-hover" id="tabla_alumnos">

</div>

        </div>
    </div>
        <tr>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Matricula</th>
            <th>Imagen perfil</th>
        </tr>
    </table>
<br>
    <button class="btn btn-primary" type="button" id="agregar"> Pintar alumno</button>
    <br>
    <form action="#" method="post" id="formulario">

        <div class="mb-3 col-3">
        <label for="nombre"class="form-label">Nombre:</label>
        <input type="text" id="nombre" name="nombre" class="form-control"/>
        </div>
        <br>
        <button class="btn btn-primary" type="button" id="create"> Nuevo alumno/a</button>
        <br>

        <div class="mb-3 col-3">
        <label for="edad"class="form-label">Edad:</label>
        <input type="text" id="edad" name="edad" class="form-control"/>
        </div>

        <br>

            <div class="mb-3 col-3">
        <label for="matricula"class="form-label">matricula:</label>
        <input type="text" id="matricula" name="matricula" class="form-control"/>
            </div>

            <br>
                <div class="mb-3 col-3">
        <label for="imagen"class="form-label">imagen:</label>
        <input type="text" id="imagen" name="imagen" class="form-control"/>
                </div>

                <br>

    </form>
</main>
<footer class="fixed-bottom py-3 bg-dark text-light">
    <div class="container text-center">
    <p>Pagina realizada por el 3D - Todos los derechos resevados</p>
    </div>
</footer>
<script src="js/tabla.js"></script>
<script src="js/bootstrap.js"></script>
</body>
</html>
